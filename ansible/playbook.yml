---
- name: Configure platform lab server
  hosts: platform_lab
  become: true

  tasks:
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure nginx is running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    - name: Install htop
      ansible.builtin.apt:
        name: htop
        state: present

    - name: Create a marker file to confirm Ansible ran
      ansible.builtin.copy:
        content: "Provisioned by Ansible on {{ ansible_date_time.iso8601 }}\n"
        dest: /etc/platform-lab-provisioned
        mode: '0644'
